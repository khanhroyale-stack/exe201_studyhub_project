# ==========================================
# StudyHub Backend — Local Development Config
# ==========================================
# Copy file này thành application.properties
# và điền giá trị thật của bạn
# KHÔNG commit file application.properties thật lên git

spring.application.name=studyhub

# Database — thay bằng thông tin local của bạn
spring.datasource.url=jdbc:mysql://localhost:3306/studyhub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA — Dùng 'create' lần đầu, sau đó đổi thành 'update'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# File Upload
server.tomcat.max-http-form-post-size=20MB
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Cloudinary — Lấy từ https://cloudinary.com/console
cloudinary.cloud_name=YOUR_CLOUD_NAME
cloudinary.api_key=YOUR_API_KEY
cloudinary.api_secret=YOUR_API_SECRET

# JWT Secret (tự đặt chuỗi bí mật ít nhất 32 ký tự)
# jwt.secret=YOUR_JWT_SECRET_AT_LEAST_32_CHARS
